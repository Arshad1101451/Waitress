name: Windows build

# Builds the Windows installer in GitHub's cloud, since Tauri's Windows
# target (MSVC + WebView2) can only be compiled on Windows itself — this
# lets you get a .msi/.exe without owning a Windows machine.
#
# Triggers:
#   - Manually, any time, from the Actions tab ("Run workflow")
#   - Automatically on every push to main
#
# Where to find the result: open the finished run under the Actions tab →
# scroll to "Artifacts" at the bottom → download "windows-installer". It's a
# zip containing the .msi and/or .exe (NSIS) installer.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
